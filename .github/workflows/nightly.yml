name: Nightly E2E Tests (Perf/PWA)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  nightly-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: |
          supabase start --exclude studio,mailpit,imgproxy,logflare,vector
          supabase db reset

      - name: Set Supabase Environment
        run: |
          SUPABASE_STATUS=$(supabase status -o json)
          API_URL=$(echo "$SUPABASE_STATUS" | jq -r '.API_URL')
          ANON=$(echo "$SUPABASE_STATUS" | jq -r '.ANON_KEY')
          SERVICE=$(echo "$SUPABASE_STATUS" | jq -r '.SERVICE_ROLE_KEY')

          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SERVICE" >> $GITHUB_ENV

          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE" >> $GITHUB_ENV

          echo "::add-mask::$ANON"
          echo "::add-mask::$SERVICE"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Build for PWA tests
        run: pnpm build --webpack
        env:
          NEXT_PUBLIC_POSTHOG_KEY: 'phc_test_key_for_e2e'

      - name: Run Perf/PWA E2E Tests
        run: pnpm exec playwright test --project=chromium --grep="Performance Regression|PWA Offline" --workers=1
        env:
          ENABLE_MSW: 'true'
          CI: 'true'

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Ensure nightly-failure label exists
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create "nightly-failure" --color "d73a4a" --description "Nightly test failure" || true

      - name: Create failure issue (if none open)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "nightly-failure" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Nightly failure issue already open — skipping creation. Adding comment to latest."
            LATEST=$(gh issue list --label "nightly-failure" --state open --json number --jq '.[0].number')
            gh issue comment "$LATEST" \
              --body "Still failing as of $(date +%Y-%m-%d). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create \
              --title "Nightly E2E Tests Failed - $(date +%Y-%m-%d)" \
              --body "Nightly performance/PWA tests failed. Check workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --label "nightly-failure"
          fi
