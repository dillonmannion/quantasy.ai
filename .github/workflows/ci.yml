name: CI

on:
  pull_request:
    branches: [prod, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.1
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check
        run: pnpm type-check
      
      - name: Lint
        run: pnpm lint
      
      - name: Run unit tests
        run: pnpm test:run
      
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.CI_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_POSTHOG_KEY: 'phc_test_key_for_e2e'
      
      - name: Debug - List build output
        run: |
          echo "=== Contents of project root ==="
          ls -la
          echo "=== Contents of .next (if exists) ==="
          ls -la .next/ || echo ".next/ does not exist"
          echo "=== Find all .next directories ==="
          find . -name ".next" -type d 2>/dev/null || echo "No .next directories found"
      
      - name: Package build artifact
        run: tar -czf nextjs-build.tar.gz .next
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: nextjs-build.tar.gz
          if-no-files-found: error
          retention-days: 3

  e2e:
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: |
          supabase start --exclude studio,inbucket,imgproxy,logflare,vector
          supabase db reset

      - name: Set Supabase environment
        run: |
          SUPABASE_STATUS=$(supabase status -o json)
          API_URL=$(echo "$SUPABASE_STATUS" | jq -r '.API_URL')
          ANON=$(echo "$SUPABASE_STATUS" | jq -r '.ANON_KEY')
          SERVICE=$(echo "$SUPABASE_STATUS" | jq -r '.SERVICE_ROLE_KEY')

          echo "$SUPABASE_STATUS" > supabase-status.json

          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SERVICE" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE" >> $GITHUB_ENV

          echo "::add-mask::$ANON"
          echo "::add-mask::$SERVICE"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.1
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .

      - name: Extract build artifact
        run: tar -xzf nextjs-build.tar.gz

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        id: run-e2e
        continue-on-error: true
        run: |
          pnpm exec playwright test --project=chromium --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --grep-invert="Performance Regression|PWA Offline" 2>&1 | tee "playwright-shard-${{ matrix.shardIndex }}.log"
        env:
          ENABLE_MSW: 'true'
          CI: 'true'

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-shard-${{ matrix.shardIndex }}
          path: blob-report/
          if-no-files-found: warn
          retention-days: 3

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results-shard-${{ matrix.shardIndex }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 3

      - name: Upload shard log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-shard-log-${{ matrix.shardIndex }}
          path: playwright-shard-${{ matrix.shardIndex }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: Collect Supabase diagnostics on failure
        if: failure()
        run: |
          {
            echo "=== supabase status ==="
            supabase status || true
            echo
            echo "=== docker ps ==="
            docker ps || true
            echo
            echo "=== supabase container logs (tail 200) ==="
            for container in $(docker ps --format '{{.Names}}' | grep 'supabase' || true); do
              echo "--- $container ---"
              docker logs --tail 200 "$container" 2>&1 || true
            done
          } > supabase-diagnostics-${{ matrix.shardIndex }}.log

      - name: Upload Supabase diagnostics
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: supabase-diagnostics-shard-${{ matrix.shardIndex }}
          path: |
            supabase-status.json
            supabase-diagnostics-${{ matrix.shardIndex }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: CI failure packet
        if: steps.run-e2e.outcome == 'failure'
        run: |
          {
            echo "## E2E shard failure summary"
            echo "- Shard: ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}"
            echo "- Log artifact: playwright-shard-log-${{ matrix.shardIndex }}"
            echo "- Trace/screenshots artifact: playwright-test-results-shard-${{ matrix.shardIndex }}"
            echo "- Blob artifact: blob-report-shard-${{ matrix.shardIndex }}"
            echo "- Supabase diagnostics artifact: supabase-diagnostics-shard-${{ matrix.shardIndex }}"
            echo ""
            echo "### Last 40 log lines"
            echo '```text'
            tail -n 40 "playwright-shard-${{ matrix.shardIndex }}.log" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if E2E failed
        if: steps.run-e2e.outcome == 'failure'
        run: exit 1

  report-merge:
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.1
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-shard-*
          path: all-blob-reports
          merge-multiple: true
      
      - name: Merge reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports
      
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
