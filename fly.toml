# fly.toml app configuration file generated for quantasy-alpha on 2026-01-23T09:25:36-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'quantasy-alpha'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'
  # Build args passed via CI workflow from GitHub secrets
  # NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
